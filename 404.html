<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Oryxen Labs</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Oryxen Labs homepage.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/styles.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('oryxen-theme') || 'dark');</script>
  <style>
    .error-page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .error-page__inner { max-width: 520px; }
    .error-page__code {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .error-page__title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .error-page__sub {
      color: var(--text-2);
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .error-page__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    @media (max-width: 480px) {
      .error-page__actions { flex-direction: column; align-items: center; }
      .error-page__actions .btn { width: 100%; max-width: 280px; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__inner">
      <div class="error-page__code" aria-hidden="true">404</div>
      <h1 class="error-page__title">Page not found</h1>
      <p class="error-page__sub">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
      <div class="error-page__actions">
        <a href="/" class="btn btn--primary">Back to Home</a>
        <a href="/#contact" class="btn btn--ghost">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
