<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#0a0a0f">
  <script>(function(){var t=localStorage.getItem('oryxen-theme');var r=document.documentElement;r.classList.add('js');r.setAttribute('data-theme',t==='light'?'light':t==='dark'?'dark':window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Oryxen Labs</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Oryxen Labs homepage.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"></noscript>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/perf.css">
  <style>
    .error-page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }
    .error-page__inner { max-width: 520px; }
    .error-page__code {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .error-page__title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .error-page__sub {
      color: var(--text-2);
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .error-page__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    @media (max-width: 480px) {
      .error-page__actions { flex-direction: column; align-items: center; }
      .error-page__actions .btn { width: 100%; max-width: 280px; justify-content: center; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main" tabindex="-1">
  <div class="error-page">
    <div class="error-page__inner">
      <a href="/" style="display:inline-flex;align-items:center;gap:.5rem;margin-bottom:2.5rem;font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:700;letter-spacing:.08em;color:var(--text-2);text-decoration:none;opacity:.75;transition:opacity .2s" aria-label="Oryxen Labs — back to home">
        <svg width="26" height="26" viewBox="0 0 100 100" aria-hidden="true" style="flex-shrink:0;display:block">
          <rect width="100" height="100" rx="22" fill="#6d28d9"/>
          <circle cx="50" cy="50" r="26" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="8.5"/>
          <line x1="40" y1="64" x2="60" y2="36" stroke="rgba(255,255,255,0.9)" stroke-width="6.5" stroke-linecap="round"/>
        </svg>
        ORYXEN <span style="opacity:.5;font-weight:400">/ Labs</span>
      </a>
      <div class="error-page__code" aria-hidden="true">404</div>
      <h1 class="error-page__title">Page not found</h1>
      <p class="error-page__sub">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
      <div class="error-page__actions">
        <a href="/" class="btn btn--primary">Back to Home</a>
        <a href="/#contact" class="btn btn--ghost">Contact Us</a>
      </div>
    </div>
  </div>
  </main>
  <script src="js/script.js" defer></script>
</body>
</html>
